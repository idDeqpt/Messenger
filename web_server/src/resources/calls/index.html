<!DOCTYPE html>
<html>
	<head>
		<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1">

		<title>Звонки</title>

		<link rel="icon" href="/favicon.png" type="image/x-icon">

		<link rel="stylesheet" href="/css/default_layout.css">
		<link rel="stylesheet" href="/css/default_content_layout.css">

		<link rel="stylesheet" href="calls/style.css">
		
		<script type="text/javascript" src="/js/api_host.js"></script>
		<script type="text/javascript" src="/js/update_token.js"></script>
		<script type="text/javascript" src="/js/check_token.js"></script>

		<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>

		<script type="text/javascript" src="/js/display_header.js"></script>
		<script type="text/javascript" src="/js/exit.js"></script>

		<script type="text/javascript" src="calls/on_load.js"></script>
	</head>
	<body>
		<div id="header" class="header"></div>
		<script type="text/javascript">display_header("Чаты");</script>

		<div class="main">
			<div class="main-content">
				<div id="join-screen" class="container-join">
					<div>
						<button class="custom-button" onclick="joinRoom()">Присоединиться по id</button>
						<button class="custom-button" onclick="createRoom()">Создать новую комнату</button>
					</div>
					<input type="text" id="room-id" class="custom-input" placeholder="Введите ID комнаты">
				</div>
				
				<div id="conference-screen" class="container-conference" style="display: none;">
					<div class="controls-grid">
						<button onclick="navigator.clipboard.writeText(currentRoom);" class="custom-button">Код приглашения</button>
						<button onclick="toggleAudio();" id="audio-btn" class="custom-button">Выключить звук</button>
						<button onclick="toggleVideo();" id="video-btn" class="custom-button">Выключить видео</button>
						<button onclick="leaveRoom();" class="custom-button exit-button">Завершить</button>
					</div>
					<div id="video-grid" class="video-grid"></div>
				</div>
			</div>
		</div>
	</body>
</html>
