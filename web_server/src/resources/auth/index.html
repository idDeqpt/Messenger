<!DOCTYPE html>
<html>
	<head>
		<title>Авторизация</title>

		<link rel="icon" href="favicon.png" type="image/x-icon">
		
		<link rel="stylesheet" href="/css/default_layout.css">

		<link rel="stylesheet" href="auth/style.css">

		<script type="text/javascript" src="/js/api_host.js"></script>
		<script type="text/javascript" src="/js/authorization.js"></script>
	</head>
	<body>
		<div class="main" id="main">
			<div class="main-header">
				<a>Регистрация/Вход</a>
			</div>

			<div class="main-inputs">
				<div>
					<a>Логин</a>
					<input type="text" id="login">
				</div>
				<div>
					<a>Пароль</a>
					<input type="password" id="password">
				</div>
			</div>

			<div class="main-buttons" id="buttons">
				<button class="custom-button" onclick="signup();"><a>Зарегистрироваться</a></button>
				<button class="custom-button" onclick="login();"><a>Войти</a></button>
			</div>
		</div>
	</body>
</html>
